<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff3cd;
            text-align: center;
            padding-top: 80px;
        }
        .card {
            width: 480px;
            margin: auto;
            background: #212529;
            color: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        h1 { color: #ffd166; }
        p  { font-size: 22px; }
        .tag {
            margin-top: 18px;
            display: inline-block;
            padding: 10px 16px;
            background: #06d6a0;
            color: #073b4c;
            border-radius: 999px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ titulo }}</h1>
        <p>{{ mensaje }}</p>
        <div class="tag">{{ subtitulo }}</div>
    </div>
</body>
</html>
